name: Daily ETF Crawl

on:
  schedule:
    # 매일 오후 6시 (KST) = 09:00 UTC, 주말 제외는 불가하므로 스크립트에서 처리
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Crawl TIME + KoAct
        run: python scripts/crawl.py $(date +%F)

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "daily update $(date +%F): auto-crawl"
            git push
          fi
